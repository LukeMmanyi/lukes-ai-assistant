<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luke's AI Assistant</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
  <nav>
    <p class="nav-p"><span class="highlight">Luke</span> the <span class="highlight">AI</span> Assistant</p>
    
    <!-- might add more here -->
  </nav>

  <div class="general-info">
    <div class="intro">
      <p class="general-p1">Ask Luke anything</p>
      <p class="general-p2">Hey im your AI Assistant. I can help you</p>
    </div>

    <div class="new-chat-div">
      <button class="new-chat">+ New chat</button>
    </div>
  </div>

  <div class="greeting">
    <!-- design here -->

    <h1>Hello, How can i help?</h1>
  </div>

  <div class="response-log">
    <p class="ai-response">

    </p>
  </div>

  <div class="search-box">
    <input  placeholder="Luke is ready to help"  type="text">
    <button class="search-button">↑</button>
  </div>

  

  <script src="scripts.js"></script>
</body>
</html>
